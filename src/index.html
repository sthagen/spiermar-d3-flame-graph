<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <script src="https://cdn.tailwindcss.com"></script>

        <title>d3-flame-graph</title>
    </head>
    <body class="py-5">
        <div class="max-w-4xl mx-auto px-4">
            <div class="pb-5 border-b border-gray-200 mb-5">
                <nav class="flex justify-end items-center gap-2">
                    <form id="form" class="flex items-center gap-2">
                        <a
                            class="px-4 py-2 rounded border border-gray-300 bg-white text-gray-700 hover:bg-gray-50"
                            href="javascript: resetZoom();"
                            >Reset zoom</a
                        >
                        <a
                            class="px-4 py-2 rounded border border-gray-300 bg-white text-gray-700 hover:bg-gray-50"
                            href="javascript: clear();"
                            >Clear</a
                        >
                        <input
                            type="text"
                            class="border border-gray-300 rounded px-3 py-1"
                            id="term"
                        />
                        <a
                            class="px-4 py-2 rounded bg-blue-600 text-white hover:bg-blue-700"
                            href="javascript: search();"
                            >Search</a
                        >
                    </form>
                </nav>
                <h3 class="text-2xl font-semibold text-gray-600">
                    d3-flame-graph
                </h3>
            </div>
            <div id="chart"></div>
            <hr class="my-4 border-gray-200" />
            <div id="details"></div>
        </div>

        <!-- D3.js -->
        <script src="https://d3js.org/d3.v7.js" charset="utf-8"></script>

        <!-- main -->
        <script type="module" src="main.js"></script>
    </body>
</html>
